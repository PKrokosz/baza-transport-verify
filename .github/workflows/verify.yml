name: Verify Emails (SMTP)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install dnspython

      - name: Verify emails
        run: python verify_smtp_bulk.py transport_final_merged_v12.csv verified_results.csv 25

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: verified-emails
          path: verified_results.csv
          retention-days: 7
